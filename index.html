<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ay Prensesi Lunara - Giydirme Oyunu</title>
<style>
    /* 1. GENEL AYARLAR */
    body {
        margin: 0;
        padding: 0;
        background-image: url('arka_plan.jpg'); 
        background-size: 100% 100%; 
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
    }

    /* 2. MANKEN SAHNESİ VE KATMANLAR */
    #characterStage {
        position: absolute;
        width: 400px;
        height: 600px;
        left: 50%;
        transform: translateX(-50%);
        top: 2%; /* Mankeni yukarı/aşağı buradan ayarla */
        z-index: 10;
    }

    #mannequin {
        width: 100%;
        height: 100%;
        background-image: url('manken_poz.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        position: relative;
    }

    /* Ortak Katman Özellikleri */
    .worn-item {
        position: absolute;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        pointer-events: none;
    }

    /* Katman Sıralaması */
    #wornShoes { z-index: 11; }
    #wornDress { z-index: 12; }
    #wornAsa   { z-index: 13; }
    #wornHair  { z-index: 15; } /* Saç elbisenin üstünde */
    #wornTac   { z-index: 16; }

    /* SAÇ İÇİN ÖZEL BOYUTLANDIRMA (Ekranı kaplamaması için) */
    #wornHair {
        width: 40%;    /* Saç hala büyükse bu rakamı küçült */
        height: auto;  /* Oranı korur */
        left: 50%;
        transform: translateX(-50%);
        top: 10px;     /* Saçı aşağı/yukarı buradan kaydır */
        background-position: top center;
    }

    #dropZone {
        position: absolute;
        width: 60%;
        height: 80%;
        top: 10%;
        left: 20%;
        z-index: 20;
    }

    /* 3. MENÜLER VE ARAYÜZ */
    .menu-panel {
        position: absolute;
        background-image: url('menuler_taslak.png');
        background-size: 100% 100%;
        padding: 10px;
        box-sizing: border-box;
    }

    .menu-header {
        text-align: center;
        font-size: 16px;
        margin-top: 10px;
        text-transform: uppercase;
        color: #e6e6fa;
        text-shadow: 1px 1px 2px #000;
    }

    #leftPanel { width: 220px; height: 500px; left: 20px; top: 50%; transform: translateY(-50%); }
    #rightPanel { width: 220px; height: 700px; right: 20px; top: 50%; transform: translateY(-50%); }
    
    #bottomPanel {
        width: 600px;
        height: 120px;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 100;
    }

    .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 5px; }

    .item-icon {
        width: 80px;
        height: 100px;
        border: 2px solid rgba(230, 230, 250, 0.3);
        border-radius: 8px;
        cursor: grab;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        background-color: rgba(0,0,0,0.2);
    }

    .item-icon:hover { transform: scale(1.05); border-color: #fff; }

    /* 4. BUTONLAR */
    .action-button {
        background: linear-gradient(180deg, #6a5acd, #483d8b);
        border: 2px solid #e6e6fa;
        color: #e6e6fa;
        padding: 8px 15px;
        border-radius: 15px;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="characterStage">
    <div id="mannequin">
        <!-- Giyilen Parçalar -->
        <div id="wornShoes" class="worn-item"></div>
        <div id="wornDress" class="worn-item"></div>
        <div id="wornAsa" class="worn-item"></div>
        <div id="wornHair" class="worn-item"></div>
        <div id="wornTac" class="worn-item"></div>
        
        <!-- Drop Alanı -->
        <div id="dropZone"></div>
    </div>
</div>

<!-- Menüler (Veri kısımları aynı kaldı) -->
<div id="leftPanel" class="menu-panel">
    <div class="menu-header">SAÇLAR</div>
    <div class="item-grid">
        <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_1_giysi.png" style="background-image: url('sac_1.png');"></div>
        <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_2_giysi.png" style="background-image: url('sac_2.png');"></div>
        <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_3_giysi.png" style="background-image: url('sac_3.png');"></div>
    </div>
</div>

<div id="rightPanel" class="menu-panel">
    <div class="menu-header">ELBİSELER</div>
    <div class="item-grid">
        <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_1_giysi.png" style="background-image: url('elbise_1.png');"></div>
        <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_2_giysi.png" style="background-image: url('elbise_2.png');"></div>
    </div>
</div>

<div id="bottomPanel" class="menu-panel">
    <button id="btnTemizle" class="action-button">TEMİZLE</button>
    <button id="btnRasgele" class="action-button">RASGELE</button>
    <button id="btnKaydet" class="action-button">KAYDET</button>
</div>

<script>
    const icons = document.querySelectorAll('.item-icon, .bottom-icon');
    const dropZone = document.getElementById('dropZone');
    const wornLayers = {
        hair: document.getElementById('wornHair'),
        dress: document.getElementById('wornDress'),
        shoes: document.getElementById('wornShoes'),
        tac: document.getElementById('wornTac'),
        asa: document.getElementById('wornAsa')
    };

    icons.forEach(icon => {
        icon.addEventListener('dragstart', function(e) {
            e.dataTransfer.setData('text/plain', this.dataset.wornImg);
            e.dataTransfer.setData('type', this.dataset.type);
        });
    });

    dropZone.addEventListener('dragover', (e) => e.preventDefault());

    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        const imgName = e.dataTransfer.getData('text/plain');
        const type = e.dataTransfer.getData('type');
        if (wornLayers[type]) {
            wornLayers[type].style.backgroundImage = `url('${imgName}')`;
        }
    });

    document.getElementById('btnTemizle').addEventListener('click', () => {
        Object.values(wornLayers).forEach(layer => layer.style.backgroundImage = 'none');
    });
</script>

</body>
</html>
