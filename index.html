<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ay Prensesi Lunara - Giydirme Oyunu</title>
<style>
    /* 1. GENEL AYARLAR */
    body {
        margin: 0;
        padding: 0;
        background-image: url('arka_plan.jpg'); 
        background-size: 100% 100%; 
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
    }

    /* 2. MANKEN VE KATMANLAR */
    #characterStage {
        position: absolute;
        width: 400px;
        height: 600px;
        left: 50%;
        transform: translateX(-50%);
        top: 2%; 
        z-index: 10;
    }

    #mannequin {
        width: 100%;
        height: 100%;
        background-image: url('manken_poz.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        position: relative;
    }

    .worn-item {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        pointer-events: none;
    }
/* Saçı küçültme ve hizalama */
    #wornHair {
        width: 80%;       /* Saçın genişliğini %80'e düşürür (İstediğin kadar azaltabilirsin) */
        height: 80%;      /* Saçın yüksekliğini %80'e düşürür */
        left: 10%;        /* Sağı ve solu ortalamak için (100-80)/2 = 10 */
        top: 0%;          /* Yukarı-aşağı konumu buradan ayarla */
        background-size: contain; 
    }
    
    /* Katman Sıralaması */
    #wornShoes { z-index: 11; }
    #wornDress { z-index: 12; }
    #wornAsa   { z-index: 13; }
    #wornHair  { z-index: 15; }
    #wornTac   { z-index: 16; }

    #dropZone {
        position: absolute;
        width: 80%;
        height: 90%;
        top: 5%;
        left: 10%;
        z-index: 30; 
    }

    /* 3. MENÜLER */
    .menu-panel {
        position: absolute;
        background-image: url('menuler_taslak.png');
        background-size: 100% 100%;
        padding: 10px;
        box-sizing: border-box;
    }

    .menu-header {
        text-align: center;
        font-size: 14px;
        color: white;
        text-shadow: 1px 1px 2px black;
        margin-top: 5px;
        text-transform: uppercase;
        font-weight: bold;
    }

    #leftPanel { width: 250px; height: 480px; left: 30px; top: 35%; transform: translateY(-50%); }
    #rightPanel { width: 250px; height: 750px; right: 30px; top: 55%; transform: translateY(-50%); }
    #bottomPanel {
        width: 580px; height: 120px; bottom: 10px; left: 50%;
        transform: translateX(-50%); display: flex;
        justify-content: space-around; align-items: center; z-index: 100;
    }

    .item-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 10px;
    }

    .item-icon {
        width: 85px;
        height: 110px;
        background-color: rgba(230, 230, 250, 0.1);
        border: 2px solid rgba(230, 230, 250, 0.3);
        border-radius: 10px;
        cursor: grab;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
    }

    .shoes-grid .item-icon { height: 65px; }

    .bottom-icon {
        width: 80px; height: 80px;
        background-size: contain; background-repeat: no-repeat;
        background-position: center; cursor: grab;
    }

    .action-button {
        background: linear-gradient(180deg, #6a5acd, #483d8b);
        border: 2px solid #e6e6fa; color: white;
        padding: 8px 12px; border-radius: 20px;
        text-transform: uppercase; font-weight: bold; cursor: pointer;
    }
</style>
</head>
<body>

<div id="characterStage">
    <div id="mannequin">
        <div id="wornShoes" class="worn-item"></div>
        <div id="wornDress" class="worn-item"></div>
        <div id="wornAsa" class="worn-item"></div>
        <div id="wornHair" class="worn-item"></div>
        <div id="wornTac" class="worn-item"></div>
        <div id="dropZone"></div>
    </div>
</div>

<!-- SOL PANEL: 5 SAÇ VE 3 AYAKKABI -->
<div id="leftPanel" class="menu-panel">
    <div class="menu-header">SAÇ MODELLERİ</div>
    <div class="item-grid hair-grid">
        <div class="item-icon" draggable="true" data-type="hair" data-worn="sac_1_giysi.png" style="background-image: url('sac_1.png');"></div>
        <div class="item-icon" draggable="true" data-type="hair" data-worn="sac_2_giysi.png" style="background-image: url('sac_2.png');"></div>
        <div class="item-icon" draggable="true" data-type="hair" data-worn="sac_3_giysi.png" style="background-image: url('sac_3.png');"></div>
        <div class="item-icon" draggable="true" data-type="hair" data-worn="sac_4_giysi.png" style="background-image: url('sac_4.png');"></div>
        <div class="item-icon" draggable="true" data-type="hair" data-worn="sac_5_giysi.png" style="background-image: url('sac_5.png');"></div>
    </div>
    <div class="menu-header">AYAKKABILAR</div>
    <div class="item-grid shoes-grid">
        <div class="item-icon" draggable="true" data-type="shoes" data-worn="ayakkabi_1_giysi.png" style="background-image: url('ayakkabi_1.png');"></div>
        <div class="item-icon" draggable="true" data-type="shoes" data-worn="ayakkabi_2_giysi.png" style="background-image: url('ayakkabi_2.png');"></div>
        <div class="item-icon" draggable="true" data-type="shoes" data-worn="ayakkabi_3_giysi.png" style="background-image: url('ayakkabi_3.png');"></div>
    </div>
</div>

<!-- SAĞ PANEL: 6 ELBİSE -->
<div id="rightPanel" class="menu-panel">
    <div class="menu-header">ELBİSELER</div>
    <div class="item-grid dress-grid">
        <div class="item-icon" draggable="true" data-type="dress" data-worn="elbise_1_giysi.png" style="background-image: url('elbise_1.png');"></div>
        <div class="item-icon" draggable="true" data-type="dress" data-worn="elbise_2_giysi.png" style="background-image: url('elbise_2.png');"></div>
        <div class="item-icon" draggable="true" data-type="dress" data-worn="elbise_3_giysi.png" style="background-image: url('elbise_3.png');"></div>
        <div class="item-icon" draggable="true" data-type="dress" data-worn="elbise_4_giysi.png" style="background-image: url('elbise_4.png');"></div>
        <div class="item-icon" draggable="true" data-type="dress" data-worn="elbise_5_giysi.png" style="background-image: url('elbise_5.png');"></div>
        <div class="item-icon" draggable="true" data-type="dress" data-worn="elbise_6_giysi.png" style="background-image: url('elbise_6.png');"></div>
    </div>
</div>

<!-- ALT PANEL: TAÇ, ASA VE BUTONLAR -->
<div id="bottomPanel" class="menu-panel">
    <div class="bottom-icon" draggable="true" data-type="tac" data-worn="tac_giysi.png" style="background-image: url('tac.png');"></div>
    <button id="btnTemizle" class="action-button">TEMİZLE</button>
    <button id="btnRasgele" class="action-button">RASGELE</button>
    <button id="btnKaydet" class="action-button">KAYDET</button>
    <div class="bottom-icon" draggable="true" data-type="asa" data-worn="asa_giysi.png" style="background-image: url('asa.png');"></div>
</div>

<script>
    // ... (Önceki kodların aynı kalsın, sadece script kısmındaki bu fonksiyonları güncelle)

    function dropItem(e) {
        e.preventDefault();
        
        const imgName = e.dataTransfer.getData('wornImgName') || e.dataTransfer.getData('wornImg') || e.dataTransfer.getData('text/plain');
        const itemType = e.dataTransfer.getData('itemType') || e.dataTransfer.getData('type');
        
        if (wornLayers[itemType]) {
            wornLayers[itemType].style.backgroundImage = "url('" + imgName + "')";

            // --- YENİ MANKEN GİZLEME MANTIĞI ---
            if (itemType === 'dress') {
                // Eğer giydirilen şey elbise ise mankeni gizle
                document.getElementById('mannequin').style.backgroundImage = "none";
            }
            // ----------------------------------
            
            wornLayers[itemType].style.opacity = 0;
            setTimeout(() => { 
                wornLayers[itemType].style.transition = 'opacity 0.3s';
                wornLayers[itemType].style.opacity = 1; 
            }, 10);
        }
    }

    // Temizle Butonunu da şu şekilde güncelle ki manken geri gelsin:
    document.getElementById('btnTemizle').addEventListener('click', () => {
        Object.values(wornLayers).forEach(layer => layer.style.backgroundImage = 'none');
        // Elbiseler gidince mankeni geri getir
        document.getElementById('mannequin').style.backgroundImage = "url('manken_poz.png')";
    });

    // Rasgele Butonuna da ekleyelim (Eğer rasgele elbise giydirirse manken silinsin)
    document.getElementById('btnRasgele').addEventListener('click', () => {
        const categories = ['hair', 'dress', 'shoes'];
        categories.forEach(type => {
            const items = document.querySelectorAll('[data-type="' + type + '"]');
            if (items.length > 0) {
                const randomIcon = items[Math.floor(Math.random() * items.length)];
                wornLayers[type].style.backgroundImage = "url('" + randomIcon.getAttribute('data-worn-img') + "')";
                
                if (type === 'dress') {
                    document.getElementById('mannequin').style.backgroundImage = "none";
                }
            }
        });
    });
    const icons = document.querySelectorAll('.item-icon, .bottom-icon');
    const dropZone = document.getElementById('dropZone');
    
    const wornLayers = {
        hair: document.getElementById('wornHair'),
        dress: document.getElementById('wornDress'),
        shoes: document.getElementById('wornShoes'),
        tac: document.getElementById('wornTac'),
        asa: document.getElementById('wornAsa')
    };

    icons.forEach(icon => {
        icon.addEventListener('dragstart', function(e) {
            e.dataTransfer.setData('wornImg', this.getAttribute('data-worn'));
            e.dataTransfer.setData('type', this.getAttribute('data-type'));
        });
    });

    dropZone.addEventListener('dragover', (e) => e.preventDefault());

    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        const img = e.dataTransfer.getData('wornImg');
        const type = e.dataTransfer.getData('type');

        if (wornLayers[type] && img) {
            wornLayers[type].style.backgroundImage = "url('" + img + "')";
        }
    });

    document.getElementById('btnTemizle').addEventListener('click', () => {
        Object.values(wornLayers).forEach(layer => layer.style.backgroundImage = 'none');
    });

    document.getElementById('btnRasgele').addEventListener('click', () => {
        ['hair', 'dress', 'shoes'].forEach(t => {
            const items = document.querySelectorAll('[data-type="' + t + '"]');
            const random = items[Math.floor(Math.random() * items.length)];
            wornLayers[t].style.backgroundImage = "url('" + random.getAttribute('data-worn') + "')";
        });
    });
</script>

</body>
</html>
