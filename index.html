<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ay Prensesi Lunara - Giydirme Oyunu</title>
<style>
    /* 1. GENEL AYARLAR VE ARKA PLAN */
   body {
      margin: 0;
      padding: 0;
      background-image: url('arka_plan.jpg'); 
      /* background-size: cover yerine bunu kullanıyoruz ki resim ezilmesin */
      background-size: 100% 100%; 
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* 2. MANKEN VE KATMANLAR */
    #characterStage {
      position: absolute;
      width: 400px;
      height: 600px;
      left: 50%;
      transform: translateX(-50%); /* Sadece yatayda ortala */
      top: -5%; /* Bu değeri artırırsan manken aşağı iner, azaltırsan yukarı çıkar */
      z-index: 10;
    }

    #mannequin {
        position: relative;
        width: 100%;
        height: 100%;
        background-image: url('manken_poz.png'); /* image_1.png'den kesilen manken */
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
    }
    
    /* --- SAÇ HİZALAMA MERKEZİ --- */

/* Saç 1 */
    [data-worn="sac_1_giysi.png"] { 
        background-size: 88% !important; 
        background-position: center 7px !important; 
}

/* Saç 2 */
    [data-worn="sac_2_giysi.png"] { 
        background-size: 80% !important; 
        background-position: center 8px !important; 
    }

/* Saç 3 */
    [data-worn="sac_3_giysi.png"] { 
        background-size: 90% !important; 
        background-position: center 6px !important; 
    }

/* Saç 4 */
    [data-worn="sac_4_giysi.png"] { 
        background-size: 90% !important; 
        background-position: center 6 px !important; 
    }

/* Saç 5 */
    [data-worn="sac_5_giysi.png"] { 
        background-size: 85% !important; 
        background-position: center 8px !important; 
    }
    
/* ------------------------------- */
    /* --- ELBİSE HİZALAMA MERKEZİ --- */

/* Elbise 1 */
    [data-worn="elbise_1_giysi.png"] { 
        background-size: 61% !important; 
        background-position: center -60px !important; 
    
    }

/* Elbise 2 */
    [data-worn="elbise_2_giysi.png"] { 
        background-size: 72% !important; 
        background-position: center -60px !important; 
        
    }

/* Elbise 3 */
    [data-worn="elbise_3_giysi.png"] { 
        background-size: 70% !important; 
        background-position: center -38px !important; 
        left: -10% !important;
    }

/* Elbise 4 */
    [data-worn="elbise_4_giysi.png"] { 
        background-size: 58% !important; 
        background-position: center -56px !important; 
    }

/* Elbise 5 */
    [data-worn="elbise_5_giysi.png"] { 
        background-size: 72% !important; 
        background-position: center -61px !important; 
        left: -10% !important;
    }

/* Elbise 6 */
    [data-worn="elbise_6_giysi.png"] { 
        background-size: 65% !important; 
        background-position: center -43px !important; 
        left: -10% !important;
    }

/* Elbise 7 */
    [data-worn="elbise_7_giysi.png"] { 
        background-size: 75% !important; 
        background-position: center -57px !important; 
    }
/* ------------------------------- */
    /* Giyilen parçalar için katmanlar (Z-index ile sıralama) */
    .worn-item {
        position: absolute;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        pointer-events: none; /* Giysilerin üzerinden sürüklemeye izin ver */
    }
/* Saçı küçültme ve hizalama */
    #wornHair {
        width: 21%;       /* Saçın genişliğini %80'e düşürür (İstediğin kadar azaltabilirsin) */
        height: 22%;      /* Saçın yüksekliğini %80'e düşürür */
        left: 40%;        /* Sağı ve solu ortalamak için (100-80)/2 = 10 */
        top: 10%;          /* Yukarı-aşağı konumu buradan ayarla */
        background-size: contain; 
    }
    
    #wornDress {
        width: 90%;
        height: 90%;
        left: 5%;
        top: 8%;
    }
    
    #wornHair { z-index: 15; }    /* Saç en üstte */
    #wornDress { z-index: 12; }   /* Elbise gövdede */
    #wornShoes { z-index: 11; }   /* Ayakkabı altta */
    #wornTac { z-index: 16; }    /* Taç saçın üstünde */
    #wornAsa { z-index: 13; }    /* Asa elde, elbisenin üstünde/altında */

    /* Bırakma Alanı (Drop Zone) - Mankenin gövdesi */
    #dropZone {
        position: absolute;
        width: 60%;
        height: 80%;
        top: 10%;
        left: 20%;
        /* debug için border: 2px dashed red; */
        z-index: 20;
    }

    /* 3. MENÜLER VE ARAYÜZ (Görseldeki yerleşim) */
    .menu-panel {
        position: absolute;
        background-image: url('menuler_taslak.png'); /* Sadece çerçeveler */
        background-size: 100% 100%;
        padding: 10px;
        box-sizing: border-box;
    }

    .menu-header {
        text-align: center;
        font-size: 18px;
        margin-top: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Sol Menü (Saç ve Ayakkabı) */
    #leftPanel {
        width: 250px;
        height: 350px;
        left: 30px;
        top: 25%;
        transform: translateY(-50%);
    }

    /* Sağ Menü (Elbiseler) */
    #rightPanel {
        width: 250px;
        height: 750px;
        right: 30px;
        top: 60%;
        transform: translateY(-50%);
    }

    /* Alt Menü (Taçlar, Asalar ve Butonlar) */
    #bottomPanel {
        width: 500px;
        height: 100px;
        bottom: 7px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 100;
    }

    /* 4. SÜRÜKLENEBİLİR ÖĞELER (İKONLAR) */
    .item-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 10px;
        justify-items: center;
    }

    .item-icon {
        width: 80px;
        height: 100px;
        background-color: rgba(230, 230, 250, 0.1); /* Hafif şeffaf kareler */
        border: 2px solid rgba(230, 230, 250, 0.3);
        border-radius: 10px;
        cursor: grab;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: transform 0.2s;
    }

    .item-icon:hover {
        transform: scale(1.05);
        border-color: rgba(230, 230, 250, 0.8);
    }

    .item-icon.dragging {
        opacity: 0.5;
        cursor: grabbing;
    }

    /* Ayakkabı ikonları için özel boyut */
    .shoes-grid .item-icon { height: 60px; }

    /* Alt menü ikonları */
    .bottom-icon {
        width: 80px;
        height: 80px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        cursor: grab;
    }

    /* 5. BUTONLAR */
    .action-button {
        background: linear-gradient(180deg, #6a5acd, #483d8b);
        border: 2px solid #e6e6fa;
        color: #e6e6fa;
        padding: 10px 20px;
        border-radius: 20px;
        text-transform: uppercase;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .action-button:hover {
        background: linear-gradient(180deg, #8470ff, #6a5acd);
    }

</style>
</head>
<body>

<div id="gameContainer">

    <div id="characterStage">
        <div id="mannequin">
            <div id="wornHair" class="worn-item"></div>
            <div id="wornDress" class="worn-item"></div>
            <div id="wornShoes" class="worn-item"></div>
            <div id="wornTac" class="worn-item"></div>
            <div id="wornAsa" class="worn-item"></div>
            
            <div id="dropZone"></div>
        </div>
    </div>

    <div id="leftPanel" class="menu-panel">
        <div class="menu-header">SAÇ MODELLERİ</div>
        <div class="item-grid hair-grid">
            <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_1_giysi.png" style="background-image: url('sac_1.png');"></div>
            <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_2_giysi.png" style="background-image: url('sac_2.png');"></div>
            <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_3_giysi.png" style="background-image: url('sac_3.png');"></div>
            <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_4_giysi.png" style="background-image: url('sac_4.png');"></div>
            <div class="item-icon" draggable="true" data-type="hair" data-worn-img="sac_5_giysi.png" style="background-image: url('sac_5.png');"></div>
        </div>
        
        <div class="menu-header" style="margin-top: 30px;">TOPUKLU AYAKKABILAR</div>
        <div class="item-grid shoes-grid">
            <div class="item-icon" draggable="true" data-type="shoes" data-worn-img="ayakkabi_1_giysi.png" style="background-image: url('ayakkabi_1.png');"></div>
            <div class="item-icon" draggable="true" data-type="shoes" data-worn-img="ayakkabi_2_giysi.png" style="background-image: url('ayakkabi_2.png');"></div>
            <div class="item-icon" draggable="true" data-type="shoes" data-worn-img="ayakkabi_3_giysi.png" style="background-image: url('ayakkabi_3.png');"></div>
        </div>
    </div>

    <div id="rightPanel" class="menu-panel">
        <div class="menu-header">ELBİSELER</div>
        <div class="item-grid dress-grid">
            <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_1_giysi.png" style="background-image: url('elbise_1.png');"></div>
            <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_2_giysi.png" style="background-image: url('elbise_2.png');"></div>
            <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_3_giysi.png" style="background-image: url('elbise_3.png');"></div>
            <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_4_giysi.png" style="background-image: url('elbise_4.png');"></div>
            <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_5_giysi.png" style="background-image: url('elbise_5.png');"></div>
            <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_6_giysi.png" style="background-image: url('elbise_6.png');"></div>
            <div class="item-icon" draggable="true" data-type="dress" data-worn-img="elbise_7_giysi.png" style="background-image: url('elbise_7.png');"></div>
        </div>
    </div>

    <div id="bottomPanel" class="menu-panel">
        <div class="menu-header">TAÇLAR</div>
        <div class="bottom-icon" draggable="true" data-type="tac" data-worn-img="tac_giysi.png" style="background-image: url('tac.png');"></div>
        
        <button id="btnTemizle" class="action-button">TEMİZLE</button>
        <button id="btnRasgele" class="action-button">RASGELE</button>
        <button id="btnKaydet" class="action-button">KAYDET</button>
        
        <div class="menu-header">ASALAR</div>
        <div class="bottom-icon" draggable="true" data-type="asa" data-worn-img="asa_giysi.png" style="background-image: url('asa.png');"></div>
    </div>

</div>

<script>
    const icons = document.querySelectorAll('.item-icon, .bottom-icon');
    const dropZone = document.getElementById('dropZone');

    const wornLayers = {
        hair: document.getElementById('wornHair'),
        dress: document.getElementById('wornDress'),
        shoes: document.getElementById('wornShoes'),
        tac: document.getElementById('wornTac'),
        asa: document.getElementById('wornAsa')
    };

    icons.forEach(icon => {
        icon.addEventListener('dragstart', dragStart);
        icon.addEventListener('dragend', dragEnd);
    });

    function dragStart(e) {
        this.classList.add('dragging');
        e.dataTransfer.setData('text/plain', this.dataset.wornImg);
        e.dataTransfer.setData('type', this.dataset.type);
    }

    function dragEnd() {
        this.classList.remove('dragging');
    }

    function dragOver(e) {
        e.preventDefault();
    }

    function dropItem(e) {
        e.preventDefault();
        const wornImgName = e.dataTransfer.getData('text/plain');
        const itemType = e.dataTransfer.getData('type');

        if (wornLayers[itemType]) {
            const wornElement = wornLayers[itemType];
            wornElement.style.backgroundImage = `url('${wornImgName}')`;
            wornElement.dataset.worn = wornImgName;
            wornElement.style.opacity = 0;
            wornElement.style.transition = 'opacity 0.3s';
            setTimeout(() => {
                wornElement.style.opacity = 1;
            }, 10);
        }
    }

    dropZone.addEventListener('dragover', dragOver);
    dropZone.addEventListener('drop', dropItem);

    document.getElementById('btnTemizle').addEventListener('click', () => {
        for (let layer in wornLayers) {
            wornLayers[layer].style.backgroundImage = 'none';
            wornLayers[layer].removeAttribute('data-worn');
        }
    });

    document.getElementById('btnRasgele').addEventListener('click', () => {
        const categories = ['hair', 'dress', 'shoes'];
        categories.forEach(type => {
            const items = document.querySelectorAll(`.item-icon[data-type="${type}"]`);
            if (items.length > 0) {
                const randomIcon = items[Math.floor(Math.random() * items.length)];
                const wornElement = wornLayers[type];
                wornElement.style.backgroundImage = `url('${randomIcon.dataset.wornImg}')`;
                wornElement.dataset.worn = randomIcon.dataset.wornImg;
            }
        });
    });

    document.getElementById('btnKaydet').addEventListener('click', () => {
        alert('Kombininiz kaydedildi! (Bu kısım sunucu bağlantısı gerektirir)');
    });
</script>
</body>
</html>
